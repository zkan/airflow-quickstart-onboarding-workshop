repo_name: zkan/airflow-quickstart-onboarding-workshop
repo_url: https://github.com/zkan/airflow-quickstart-onboarding-workshop
site_name: "Getting Started Contributing to Apache Airflow: Quickstart Onboarding Workshop"
site_url: https://zkan.github.io/airflow-quickstart-onboarding-workshop

theme:
  name: material
  features:
    - content.code.copy
  palette:
    scheme: default
    primary: teal
    accent: red

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences

plugins:
  - git-authors:
      show_email_address: false
  - git-revision-date-localized:
      enable_creation_date: false
  - search

nav:
  - Home: index.md
  - Preparing the Local Development Environment: preparing-local-development-environment.md
  - GitHub Setup: github-setup.md
  - Installing Breeze: installing-breeze.md
  - Starting Contributing: starting-contributing.md
  - After Your PR Is Merged: after-your-pr-is-merged.md
